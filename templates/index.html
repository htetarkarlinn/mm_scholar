<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mm_scholar — Scholarship Finder</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

<nav class="navbar navbar-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">mm_scholar</a>
    <a class="nav-link text-white" href="/feedback-results">Feedback</a>
  </div>
</nav>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-7">

      <div class="text-center mb-4">
        <h1 class="fw-bold">Find Your Scholarship</h1>
        <p class="text-muted">Tell us about your study goals and we will match you with the best scholarships available for Myanmar students.</p>
      </div>

      <div class="card shadow-sm">
        <div class="card-body p-4">
          <form action="/recommend" method="POST">

            <div class="mb-3">
              <label class="form-label fw-semibold">Preferred country of study</label>
              <select name="country" class="form-select" required>
                <option value="" disabled selected>Select a country</option>
                {% for c in countries %}
                <option value="{{ c }}">{{ c }}</option>
                {% endfor %}
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Study level</label>
              <select name="level" class="form-select" required>
                <option value="" disabled selected>Select a level</option>
                {% for l in levels %}
                <option value="{{ l }}">{{ l | replace("_", " ") | title }}</option>
                {% endfor %}
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Field of study</label>
              <select name="field" class="form-select" required>
                <option value="" disabled selected>Select a field</option>
                {% for f in fields %}
                <option value="{{ f }}">{{ f }}</option>
                {% endfor %}
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Funding preference</label>
              <select name="funding" class="form-select" required>
                <option value="" disabled selected>Select funding type</option>
                {% for ft in funding_types %}
                <option value="{{ ft }}">{{ ft | replace("_", " ") | title }}</option>
                {% endfor %}
              </select>
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold">Recommendation model</label>
              <select name="model" class="form-select">
                <option value="dt" selected>Decision Tree (Best — 71.76%)</option>
                <option value="rf">Random Forest (67.06%)</option>
                <option value="knn">k-NN (34.12%)</option>
              </select>
              <div class="form-text">Decision Tree is recommended based on evaluation results.</div>
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-primary btn-lg">Find Scholarships</button>
            </div>

          </form>
        </div>
      </div>

      <p class="text-center text-muted mt-3" style="font-size: 13px;">
  Based on 421 scholarships across 25 countries
</p>

<div class="text-center mt-2">
  <a href="/compare" class="btn btn-outline-secondary btn-sm">
    View Model Comparison →
  </a>
</div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
